<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#faf4e8" />
  <title>Menù</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Cormorant+SC:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #faf4e8;
      --ink: #2a1d10;
      --muted: #6b5a44;
      --gold: #a8884a;
      --rule: #c8b58a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Cormorant Garamond', 'Garamond', serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 28px;
    }

    .menu {
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
    }

    .eyebrow {
      font-family: 'Cormorant SC', 'Cormorant Garamond', serif;
      letter-spacing: 0.35em;
      font-size: 13px;
      color: var(--gold);
      text-align: center;
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    .eyebrow .amp {
      font-style: italic;
      font-family: 'Cormorant Garamond', serif;
      letter-spacing: 0;
      margin: 0 0.15em;
    }

    .coda {
      margin-top: 36px;
      text-align: center;
      font-style: italic;
      font-weight: 300;
      color: var(--muted);
      font-size: clamp(16px, 3.6vw, 18px);
      line-height: 1.4;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-style: italic;
      font-size: clamp(56px, 14vw, 88px);
      text-align: center;
      line-height: 1;
      color: var(--ink);
    }

    .ornament {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin: 22px 0 40px;
      color: var(--gold);
    }
    .ornament .line {
      flex: 1;
      max-width: 130px;
      height: 1px;
      background: var(--rule);
    }
    .ornament svg {
      width: 22px;
      height: 22px;
      display: block;
    }

    .section { margin-top: 36px; }
    .section:first-of-type { margin-top: 0; }

    .section-title {
      font-family: 'Cormorant SC', serif;
      font-weight: 500;
      letter-spacing: 0.38em;
      text-align: center;
      color: var(--gold);
      font-size: 13px;
      margin-bottom: 22px;
      text-transform: uppercase;
    }

    .dish {
      text-align: center;
      padding: 14px 8px;
    }

    .dish .name {
      font-size: clamp(22px, 5vw, 26px);
      font-weight: 500;
      color: var(--ink);
      line-height: 1.25;
    }

    .dish .desc {
      font-style: italic;
      font-weight: 300;
      color: var(--muted);
      font-size: clamp(16px, 3.6vw, 18px);
      margin-top: 6px;
      line-height: 1.4;
    }

    .footer {
      margin-top: 48px;
      text-align: center;
      color: var(--gold);
      font-family: 'Cormorant SC', serif;
      letter-spacing: 0.4em;
      font-size: 11px;
      text-transform: uppercase;
    }

    @media (max-width: 420px) {
      body { padding: 36px 22px; }
      .ornament { margin: 18px 0 32px; }
      .section { margin-top: 28px; }
      .footer { margin-top: 36px; }
    }
  </style>
</head>
<body>
  <main class="menu" role="main">
    <p class="eyebrow">Giacomo <span class="amp">&amp;</span> Caterina</p>
    <h1>Menù</h1>

    <div class="ornament" aria-hidden="true">
      <span class="line"></span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
        <path d="M12 2 C 14 7, 14 7, 19 9 C 14 11, 14 11, 12 16 C 10 11, 10 11, 5 9 C 10 7, 10 7, 12 2 Z" />
        <circle cx="12" cy="20" r="1.2" fill="currentColor" stroke="none" />
      </svg>
      <span class="line"></span>
    </div>

    <section class="section">
      <h2 class="section-title">Primi</h2>
      <div class="dish">
        <p class="name">Tortelloni</p>
        <p class="desc">ricotta di capra e ortica</p>
      </div>
      <div class="dish">
        <p class="name">Maccheroni al pettine</p>
        <p class="desc">ragù di galletto</p>
      </div>
    </section>

    <section class="section">
      <h2 class="section-title">Secondi</h2>
      <div class="dish">
        <p class="name">Guanciale</p>
        <p class="desc">con patate al forno</p>
      </div>
      <div class="dish">
        <p class="name">Roastbeef</p>
        <p class="desc">con bietole</p>
      </div>
    </section>

    <p class="coda">a seguire, buffet di dolci</p>

    <p class="footer">Buon appetito</p>
  </main>
</body>
</html>
