<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>Menù — Stampa A4</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Cormorant+SC:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    @page {
      size: A4 portrait;
      margin: 0;
    }

    :root {
      --bg: #faf4e8;
      --ink: #2a1d10;
      --muted: #6b5a44;
      --gold: #a8884a;
      --rule: #c8b58a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 210mm;
      height: 297mm;
      background: var(--bg);
      color: var(--ink);
      font-family: 'Cormorant Garamond', 'Garamond', serif;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overflow: hidden;
    }

    body {
      padding: 26mm 24mm;
      display: flex;
      flex-direction: column;
    }

    .eyebrow {
      font-family: 'Cormorant SC', 'Cormorant Garamond', serif;
      font-weight: 500;
      letter-spacing: 0.35em;
      font-size: 12pt;
      color: var(--gold);
      text-align: center;
      text-transform: uppercase;
      margin-bottom: 6mm;
    }
    .eyebrow .amp {
      font-style: italic;
      font-family: 'Cormorant Garamond', serif;
      letter-spacing: 0;
      margin: 0 0.15em;
    }

    .coda {
      margin-top: 9mm;
      text-align: center;
      font-style: italic;
      font-weight: 300;
      color: var(--muted);
      font-size: 14pt;
      line-height: 1.4;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-style: italic;
      font-size: 80pt;
      text-align: center;
      line-height: 1;
      color: var(--ink);
      letter-spacing: 0.005em;
    }

    .ornament {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6mm;
      margin: 9mm 0 12mm;
      color: var(--gold);
    }
    .ornament .line {
      flex: 1;
      max-width: 48mm;
      height: 0.35mm;
      background: var(--rule);
    }
    .ornament svg {
      width: 8mm;
      height: 8mm;
      display: block;
    }

    .menu-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .section { margin-top: 11mm; }
    .section:first-of-type { margin-top: 0; }

    .section-title {
      font-family: 'Cormorant SC', serif;
      font-weight: 500;
      letter-spacing: 0.4em;
      text-align: center;
      color: var(--gold);
      font-size: 12pt;
      margin-bottom: 6mm;
      text-transform: uppercase;
    }

    .dish {
      text-align: center;
      padding: 4mm 4mm;
    }
    .dish + .dish {
      margin-top: 1mm;
    }

    .dish .name {
      font-size: 20pt;
      font-weight: 500;
      color: var(--ink);
      line-height: 1.25;
    }

    .dish .desc {
      font-style: italic;
      font-weight: 300;
      color: var(--muted);
      font-size: 14pt;
      margin-top: 1.5mm;
      line-height: 1.4;
    }

    .footer {
      margin-top: 10mm;
      text-align: center;
      color: var(--gold);
      font-family: 'Cormorant SC', serif;
      letter-spacing: 0.45em;
      font-size: 10pt;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <p class="eyebrow">Giacomo <span class="amp">&amp;</span> Caterina</p>
  <h1>Menù</h1>

  <div class="ornament" aria-hidden="true">
    <span class="line"></span>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
      <path d="M12 2 C 14 7, 14 7, 19 9 C 14 11, 14 11, 12 16 C 10 11, 10 11, 5 9 C 10 7, 10 7, 12 2 Z" />
      <circle cx="12" cy="20" r="1.2" fill="currentColor" stroke="none" />
    </svg>
    <span class="line"></span>
  </div>

  <div class="menu-body">
    <section class="section">
      <h2 class="section-title">Primi</h2>
      <div class="dish">
        <p class="name">Tortelloni</p>
        <p class="desc">ricotta di capra e ortica</p>
      </div>
      <div class="dish">
        <p class="name">Maccheroni al pettine</p>
        <p class="desc">ragù di galletto</p>
      </div>
    </section>

    <section class="section">
      <h2 class="section-title">Secondi</h2>
      <div class="dish">
        <p class="name">Guanciale</p>
        <p class="desc">con patate al forno</p>
      </div>
      <div class="dish">
        <p class="name">Roastbeef</p>
        <p class="desc">con bietole</p>
      </div>
    </section>

    <p class="coda">a seguire, buffet di dolci</p>
  </div>

  <p class="footer">Buon appetito</p>
</body>
</html>
